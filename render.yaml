services:
  - type: web
    name: burn-polygon-editor
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: DRIVE_ROOT_FOLDER_ID
        sync: false
